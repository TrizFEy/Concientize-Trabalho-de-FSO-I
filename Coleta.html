<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <style>
        body {
            background-color: #EAF4E9 !important;
        }

        .navbar-custom {
            background-color: #EAF4E9;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-custom {
            background-color: #B3D7B6 !important;
            border: none;
            justify-content: center;
            width: 60%;
            height: 32%;
        }

        .mycontainer {
            width: 90vw;
            height: 80%;
            display: flex;
        }

        .left-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        .left-container :nth-child(8) {
            justify-self: center;
            align-self: center;
        }

    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom mb-5">
        <div class="container-fluid">
            <a class="navbar-brand ms-auto" href="/Index.html">
                <img src="https://cdn-icons-png.flaticon.com/512/1995/1995107.png" alt="Logo" height="30"
                    class="d-inline-block align-text-top">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="/Index.html">Informações</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/Coleta.html">Coleta</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/Denúncia.html">Denúncia</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ÓrgãosPúblicos.html">Órgãos Públicos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contato.html">Contato</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/ConsultarProtocolo.html">Consultar Protocolo</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="title" style="margin-left: 5%;">
        <h3 class="titulo mb-5">Solicitação de Coleta</h3>
    </div>

    <div class="mycontainer" style="margin: auto;">

        <div class="left-container" style="width: 50%;">

            <div style="width: 80%">
                <p>Estado</p>
                <select class="form-select mb-5" aria-label="Default select example">
                    <option selected>Escolha o Estado...</option>
                    <option value="1">Santa Catarina</option>
                    <option value="2">Paraná</option>
                    <option value="3">Acre</option>
                </select>
            </div>
            <div style="width: 80%">
                <p>Cidade</p>
                <select class="form-select float-start mb-5" aria-label="Default select example">
                    <option selected>Escolha a Cidade...</option>
                    <option value="1">Joinville</option>
                    <option value="2">Blumenau</option>
                    <option value="3">Itajaí</option>
                </select>
            </div>
            <div style="width: 80%">
                <p>Tipo de Material</p>
                <select class="form-select mb-5" aria-label="Default select example">
                    <option selected>Tipo de Material...</option>
                    <option value="1">Móvel</option>
                    <option value="2">Eletrodoméstico</option>
                    <option value="3">Eletrônico</option>
                </select>
            </div>
            <div style="width: 80%">
                <p>Quantidade</p>
                <select class="form-select mb-5" aria-label="Default select example">
                    <option selected>Quantidade</option>
                    <option value="1">Apenas 1</option>
                    <option value="2">Até 3</option>
                    <option value="3">Acima de 5</option>
                </select>
            </div>
            <div style="width: 80%">
                <p>Nome</p>
                <div class="input-group mb-5">
                    <input type="text" class="form-control" placeholder="Digite seu nome..."
                        aria-label="Digite seu nome..." aria-describedby="button-addon2">
                </div>
            </div>
            <div style="width: 80%;">
                <p>Telefone</p>
                <div class="input-group mb-5">
                    <input type="text" class="form-control" placeholder="Digite seu telefone..."
                        aria-label="Digite seu telefone..." aria-describedby="button-addon2">
                </div>
            </div>
            <div style="width: 100%;">
                <p>Localização da Coleta</p>
                <div class="input-group mb-5">
                    <input type="text" class="form-control" placeholder="Digite a localização do resíduo..."
                        aria-label="Digite a localização do resíduo..." aria-describedby="button-addon2">
                </div>
            </div style>

            <button type="button" class="btn btn-custom">Confirmar</button>
        </div>
        <div class="right-container" style="width: 50%;">
            <img src="https://tse3.mm.bing.net/th/id/OIP.nxo1G40q9G525xC5zf-Q3AHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
                style="box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);" alt="Mapa">
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
